const COMPARE_METRICS = [
  { key: "revenue", label: "Revenue", fmt: fmtB, accessor: c => c.financials.revenue },
  { key: "ebitda", label: "EBITDA", fmt: fmtB, accessor: c => c.financials.ebitda },
  { key: "ebitdaMargin", label: "EBITDA Margin %", fmt: fmtPct, accessor: c => c.kpis.ebitdaMargin },
  { key: "ebitMargin", label: "EBIT Margin %", fmt: fmtPct, accessor: c => c.kpis.ebitMargin },
  { key: "niMargin", label: "Net Income Margin %", fmt: fmtPct, accessor: c => c.kpis.niMargin },
  { key: "ndEbitda", label: "Net Debt / EBITDA", fmt: fmtX, accessor: c => c.kpis.ndEbitda },
  { key: "capex", label: "Capex $B", fmt: fmtB, accessor: c => c.financials.capex },
  { key: "capexRev", label: "Capex / Revenue %", fmt: fmtPct, accessor: c => c.kpis.capexRev },
  { key: "fcfEbitda", label: "FCF / EBITDA", fmt: fmtX, accessor: c => c.kpis.fcfEbitda },
  { key: "totalAssets", label: "Total Assets $B", fmt: fmtB, accessor: c => c.financials.totalAssets },
  { key: "marketCap", label: "Market Cap", fmt: fmtM, accessor: c => c.financials.marketCap },
  { key: "evEbitda", label: "EV / EBITDA", fmt: fmtX, accessor: c => c.financials.evEbitda },
];

function CompareTab() {
  const [metric, setMetric] = useState("ebitdaMargin");
  const [active, setActive] = useState(new Set(CO_LIST.map(c => c.id)));

  const m = COMPARE_METRICS.find(x => x.key === metric);
  const filtered = CO_LIST.filter(c => active.has(c.id) && m.accessor(c) != null);
  const maxVal = Math.max(...filtered.map(c => Math.abs(m.accessor(c))));
  const sorted = [...filtered].sort((a, b) => m.accessor(b) - m.accessor(a));

  return (
    <div>
      <div className="compare-controls">
        <select className="metric-select" value={metric} onChange={e => setMetric(e.target.value)}>
          {COMPARE_METRICS.map(m => <option key={m.key} value={m.key}>{m.label}</option>)}
        </select>
        <div style={{ flex: 1 }} />
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {CO_LIST.map(co => (
            <div
              key={co.id}
              className={`co-toggle ${active.has(co.id) ? "on" : ""}`}
              style={{ borderColor: active.has(co.id) ? co.color : undefined, color: active.has(co.id) ? co.color : undefined }}
              onClick={() => {
                const n = new Set(active);
                n.has(co.id) ? n.delete(co.id) : n.add(co.id);
                setActive(n);
              }}
            >
              {co.flag} {co.displayName}
            </div>
          ))}
        </div>
      </div>

      <div className="hbar-chart">
        <div className="hbar-title">{m.label} — FY2024</div>
        {sorted.map(co => {
          const val = m.accessor(co);
          const pct = maxVal > 0 ? Math.abs(val) / maxVal * 100 : 0;
          const isNeg = val < 0;
          return (
            <div className="hbar-row" key={co.id}>
              <div className="hbar-label">
                <span className="hbar-flag">{co.flag}</span>
                {co.displayName}
              </div>
              <div className="hbar-track">
                <div
                  className="hbar-fill"
                  style={{
                    width: `${pct}%`,
                    background: isNeg
                      ? "rgba(255,58,92,0.6)"
                      : `linear-gradient(90deg, ${co.color}99, ${co.color})`,
                    minWidth: 40,
                  }}
                >
                  <span className="hbar-val">{m.fmt(val)}</span>
                </div>
              </div>
              <RankPill rank={RANKS[metric]?.[co.id] || "—"} />
            </div>
          );
        })}
      </div>

      {/* Profitability bubble scatter */}
      <div className="hbar-chart">
        <div className="hbar-title">Profitability Matrix — EBITDA Margin vs Net Debt/EBITDA</div>
        <div style={{ position: "relative", height: 280, marginTop: 16 }}>
          <svg width="100%" height="280" style={{ position: "absolute", top: 0, left: 0 }}>
            {/* Grid lines */}
            {[0,25,50,75,100].map(pct => (
              <line key={pct} x1={`${pct}%`} y1="0" x2={`${pct}%`} y2="260"
                stroke="rgba(255,255,255,0.04)" strokeWidth="1" />
            ))}
            {[0,25,50,75,100].map(pct => (
              <line key={pct} x1="0" y1={`${pct * 260 / 100}`} x2="100%" y2={`${pct * 260 / 100}`}
                stroke="rgba(255,255,255,0.04)" strokeWidth="1" />
            ))}
          </svg>
          {CO_LIST.filter(c => c.kpis.ebitdaMargin && c.kpis.ndEbitda).map(co => {
            const x = (co.kpis.ebitdaMargin / 60) * 100; // 0–60%
            const y = 100 - (co.kpis.ndEbitda / 12) * 100; // 0–12x inverted
            const size = 8 + Math.sqrt(co.financials.marketCap / 147400) * 24;
            return (
              <div key={co.id} style={{
                position: "absolute",
                left: `${Math.min(95, Math.max(2, x))}%`,
                top: `${Math.min(90, Math.max(5, y))}%`,
                transform: "translate(-50%,-50%)",
                display: "flex", flexDirection: "column", alignItems: "center",
              }}>
                <div style={{
                  width: size, height: size, borderRadius: "50%",
                  background: co.color, opacity: 0.85,
                  boxShadow: `0 0 ${size/2}px ${co.color}50`,
                }} />
                <div style={{ fontSize: 9, color: "var(--text2)", marginTop: 3, whiteSpace: "nowrap" }}>
                  {co.displayName}
                </div>
              </div>
            );
          })}
          <div style={{ position: "absolute", bottom: -20, left: "50%", transform: "translateX(-50%)" }}>
            <span className="axis-label">→ EBITDA Margin (higher = better)</span>
          </div>
          <div style={{ position: "absolute", top: "50%", left: -30, transform: "translateY(-50%) rotate(-90deg)" }}>
            <span className="axis-label">↑ Lower leverage</span>
          </div>
        </div>
        <div style={{ marginTop: 28, fontSize: 10, color: "var(--text3)" }}>
          Bubble size = Market Cap. Ideal position: upper-right (high margins, low leverage)
        </div>
      </div>
    </div>
  );
}

// ─── DETAIL TAB ─────────────────────────────────────────────────────────────
function DetailTab({ filesAvailable, aiData = {}, setAiData = () => {} }) {
  const [selected, setSelected] = useState("ENEL");
  const [loading, setLoading] = useState({});

  const co = CO_LIST.find(c => c.id === selected);

  const fetchInsights = async (coId) => {
    const company = CO_LIST.find(c => c.id === coId);
    if (!company || loading[coId]) return;
    setLoading(prev => ({ ...prev, [coId]: true }));

    try {
      const prompt = `You are a senior energy sector analyst. Based on your knowledge of ${company.displayName} (${company.ticker}), provide a concise but substantive analysis for FY2024 covering:

1. BUSINESS MODEL & SEGMENTS (2-3 sentences): Main business segments by geography and type (generation, distribution, renewables, transmission). Approximate revenue/EBITDA split if known.

2. KEY SUCCESS DRIVERS (3-4 bullet points): The 2-3 most critical drivers of the company's financial performance and competitive position.

3. STRATEGIC POSITIONING (2-3 sentences): What differentiates this company vs peers? Key strategic priorities.

4. KEY RISKS (2 bullet points): Main challenges or risks for this company.

Financial context: Revenue $${company.financials.revenue}B, EBITDA $${company.financials.ebitda}B (${company.kpis.ebitdaMargin}% margin), Net Debt/EBITDA ${company.kpis.ndEbitda}x, Capex $${company.financials.capex || 'N/A'}B.

Be specific and data-driven. Avoid generic statements.`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await response.json();
      const text = data.content?.[0]?.text || "Unable to load analysis.";
      setAiData(prev => ({ ...prev, [coId]: text }));
    } catch (e) {
      setAiData(prev => ({ ...prev, [coId]: "Error loading analysis. Please try again." }));
    }
    setLoading(prev => ({ ...prev, [coId]: false }));
  };

  const totalDetailDone = Object.keys(aiData).length;
  const totalDetailLoading = Object.values(loading).filter(Boolean).length;

  const generateAllInsights = async () => {
    const pending = CO_LIST.filter(c => !aiData[c.id] && !loading[c.id]);
    const BATCH = 3;
    for (let i = 0; i < pending.length; i += BATCH) {
      const batch = pending.slice(i, i + BATCH);
      await Promise.all(batch.map(c => fetchInsights(c.id)));
      if (i + BATCH < pending.length) await new Promise(r => setTimeout(r, 1200));
    }
  };

  const kpiCards = [
    { label: "EBITDA Margin", val: fmtPct(co.kpis.ebitdaMargin), rank: RANKS.ebitdaMargin?.[co.id] },
    { label: "EBIT Margin", val: fmtPct(co.kpis.ebitMargin), rank: RANKS.ebitMargin?.[co.id] },
    { label: "Net Debt/EBITDA", val: fmtX(co.kpis.ndEbitda), rank: RANKS.ndEbitda?.[co.id] },
    { label: "Capex/Revenue", val: fmtPct(co.kpis.capexRev), rank: null },
    { label: "FCF/EBITDA", val: fmtX(co.kpis.fcfEbitda), rank: RANKS.fcfEbitda?.[co.id] },
    { label: "NI Margin", val: fmtPct(co.kpis.niMargin), rank: RANKS.niMargin?.[co.id] },
    { label: "EV/EBITDA", val: fmtX(co.financials.evEbitda), rank: RANKS.evEbitda?.[co.id] },
    { label: "Market Cap", val: fmtM(co.financials.marketCap), rank: RANKS.marketCap?.[co.id] },
  ];

  return (
    <div className="detail-grid">
      {/* Left: company list */}
      <div className="company-list">
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <div className="section-title">Select Company</div>
          <button onClick={generateAllInsights} disabled={totalDetailLoading > 0 || totalDetailDone === 12}
            style={{ padding: '5px 10px', borderRadius: 6, border: '1px solid var(--border2)', background: 'transparent',
              color: totalDetailDone === 12 ? 'var(--green)' : 'var(--accent)', cursor: 'pointer',
              fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: '0.05em', textTransform: 'uppercase',
              opacity: totalDetailLoading > 0 ? 0.5 : 1 }}>
            {totalDetailDone === 12 ? '✓ All Done' : totalDetailLoading > 0 ? `${totalDetailLoading} running…` : `◈ Gen All (${totalDetailDone}/12)`}
          </button>
        </div>
        {CO_LIST.sort((a,b) => b.financials.revenue - a.financials.revenue).map(c => (
          <div
            key={c.id}
            className={`company-pill ${selected === c.id ? "active" : ""}`}
            onClick={() => setSelected(c.id)}
          >
            <div className="co-dot" style={{ background: c.color }} />
            <div style={{ flex: 1 }}>
              <div className="cp-name">{c.displayName}</div>
              <div className="cp-sub">{c.flag} {c.country} · ${c.financials.revenue}B rev</div>
            </div>
            {loading[c.id] ? <span style={{ fontSize: 9, color: 'var(--accent)' }}>…</span>
              : aiData[c.id] ? <span style={{ fontSize: 10, color: '#10B981' }}>✓</span>
              : null}
          </div>
        ))}
      </div>

      {/* Right: detail panel */}
      <div>
        <div className="detail-panel">
          <div className="detail-header">
            <div>
              <div className="detail-title" style={{ color: co.color }}>{co.displayName}</div>
              <div className="detail-meta">
                <span className="meta-chip">{co.flag} {co.country}</span>
                <span className="meta-chip">{co.exchange}: {co.ticker}</span>
                <span className="meta-chip">FY2024</span>
                <span className="meta-chip">Rank #{RANKS.revenue?.[co.id]} by Revenue</span>
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 24, fontWeight: 800 }}>{fmtB(co.financials.revenue)}</div>
              <div style={{ fontSize: 11, color: "var(--text3)" }}>Revenue</div>
            </div>
          </div>

          {/* KPI cards */}
          <div className="section-title">Performance KPIs</div>
          <div className="kpi-grid">
            {kpiCards.map(k => (
              <div className="kpi-card" key={k.label}>
                <div className="kpi-label">{k.label}</div>
                <div className="kpi-val" style={{ color: co.color }}>{k.val}</div>
                {k.rank && <div className="kpi-rank">Rank #{k.rank} / 12</div>}
              </div>
            ))}
          </div>

          {/* Financials table */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 20 }}>
            <div>
              <div className="section-title" style={{ fontSize: 11 }}>Income Statement</div>
              <table className="fin-table">
                {[
                  ["Revenue", fmtB(co.financials.revenue)],
                  ["EBITDA", fmtB(co.financials.ebitda)],
                  ["EBIT", fmtB(co.financials.ebit)],
                  ["D&A", fmtB(co.financials.da)],
                  ["Net Income", fmtB(co.financials.netIncome)],
                ].map(([k, v]) => (
                  <tr key={k}><td>{k}</td><td>{v}</td></tr>
                ))}
              </table>
            </div>
            <div>
              <div className="section-title" style={{ fontSize: 11 }}>Balance Sheet & Cash Flow</div>
              <table className="fin-table">
                {[
                  ["Total Assets", fmtB(co.financials.totalAssets)],
                  ["Total Debt", fmtB(co.financials.totalDebt)],
                  ["Net Debt", fmtB(co.financials.netDebt)],
                  ["Equity", fmtB(co.financials.equity)],
                  ["Cash from Ops", fmtB(co.financials.cfo)],
                  ["Capex", fmtB(co.financials.capex)],
                  ["Free Cash Flow", fmtB(co.financials.fcf)],
                ].map(([k, v]) => (
                  <tr key={k}><td>{k}</td><td>{v}</td></tr>
                ))}
              </table>
            </div>
          </div>

          {/* AI Analysis Section */}
          <div className="ai-section">
            <div className="ai-header">
              <div>
                <div className="ai-title">AI Business Analysis</div>
                <div style={{ fontSize: 10, color: "var(--text3)", marginTop: 2 }}>
                  Business model · Key drivers · Strategy · Risks
                </div>
              </div>
              <span className="ai-badge">Claude AI</span>
            </div>
            <div className="ai-body">
              {aiData[selected] ? (
                <div className="ai-content">{aiData[selected]}</div>
              ) : loading[selected] ? (
                <div className="ai-loading">
                  <div className="dot-pulse">
                    <span /><span /><span />
                  </div>
                  <span>Analyzing {co.displayName}…</span>
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <div style={{ fontSize: 12, color: "var(--text3)", lineHeight: 1.6 }}>
                    Load an AI-powered analysis of {co.displayName}'s business model, key success drivers, strategic positioning, and risks based on FY2024 data.
                    {!filesAvailable && (
                      <span style={{ color: "var(--text3)" }}>
                        {" "}Upload the annual report txt files to enrich with segment-level data from the actual reports.
                      </span>
                    )}
                  </div>
                  <div>
                    <button className="ai-btn" onClick={() => fetchInsights(selected)}>
                      ◈ Generate Analysis for {co.displayName}
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── SEGMENTS TAB ─────────────────────────────────────────────────────────────
function SegmentsTab({ filesUploaded, segData = {}, setSegData = () => {} }) {
  const [selected, setSelected] = useState("ENEL");
  const [loading, setLoading] = useState({});

  const co = CO_LIST.find(c => c.id === selected);

  const fetchSegments = async (coId) => {
    const company = CO_LIST.find(c => c.id === coId);
    if (!company || loading[coId]) return;

    // Use hardcoded real data if available (from uploaded annual reports)
    if (REAL_SEGMENT_DATA[coId]) {
      setSegData(prev => ({ ...prev, [coId]: REAL_SEGMENT_DATA[coId] }));
      return;
    }

    setLoading(prev => ({ ...prev, [coId]: true }));

    try {
      const prompt = `You are a financial analyst extracting segment data for ${company.displayName} from their FY2024 annual report.

Based on your knowledge of ${company.displayName}'s FY2024 annual report and segment disclosures, provide the following in JSON format ONLY (no markdown, no explanation):

{
  "segments": [
    {"name": "segment name", "type": "geography|business", "revenue": number_in_USD_billions, "ebitda": number_in_USD_billions, "capex": number_in_USD_billions_or_null, "assets": number_in_USD_billions_or_null}
  ],
  "geoSplit": [
    {"region": "region name", "revenuePct": percentage_0_to_100}
  ],
  "businessSplit": [
    {"segment": "segment name", "ebitdaPct": percentage_0_to_100, "color": "#hexcolor"}
  ],
  "keyFacts": ["fact 1", "fact 2", "fact 3"]
}

Use actual data from ${company.displayName}'s 2024 report. Total revenue should approximately equal $${company.financials.revenue}B. If exact data is unavailable, provide best estimates based on known segment structure. Return ONLY valid JSON.`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await response.json();
      const text = data.content?.[0]?.text || "{}";
      try {
        const clean = text.replace(/```json|```/g, "").trim();
        const parsed = JSON.parse(clean);
        setSegData(prev => ({ ...prev, [coId]: parsed }));
      } catch {
        setSegData(prev => ({ ...prev, [coId]: { error: "Could not parse segment data" } }));
      }
    } catch (e) {
      setSegData(prev => ({ ...prev, [coId]: { error: "API error" } }));
    }
    setLoading(prev => ({ ...prev, [coId]: false }));
  };

  const seg = segData[selected];
  const totalSegDone = Object.keys(segData).length;
  const totalSegLoading = Object.values(loading).filter(Boolean).length;

  const generateAllSegments = async () => {
    const pending = CO_LIST.filter(c => !segData[c.id] && !loading[c.id]);
    // hardcoded ones are instant — fire them all, then batch API ones
    const instant = pending.filter(c => REAL_SEGMENT_DATA[c.id]);
    const needsApi = pending.filter(c => !REAL_SEGMENT_DATA[c.id]);
    instant.forEach(c => fetchSegments(c.id));
    const BATCH = 3;
    for (let i = 0; i < needsApi.length; i += BATCH) {
      const batch = needsApi.slice(i, i + BATCH);
      await Promise.all(batch.map(c => fetchSegments(c.id)));
      if (i + BATCH < needsApi.length) await new Promise(r => setTimeout(r, 1200));
    }
  };

  return (
    <div className="detail-grid">
      <div className="company-list">
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <div className="section-title">Select Company</div>
          <button onClick={generateAllSegments} disabled={totalSegLoading > 0 || totalSegDone === 12}
            style={{ padding: '5px 10px', borderRadius: 6, border: '1px solid var(--border2)', background: 'transparent',
              color: totalSegDone === 12 ? 'var(--green)' : 'var(--accent)', cursor: 'pointer',
              fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: '0.05em',
              textTransform: 'uppercase', opacity: totalSegLoading > 0 ? 0.5 : 1 }}>
            {totalSegDone === 12 ? '✓ All Done' : totalSegLoading > 0 ? `${totalSegLoading} running…` : `◈ Load All (${totalSegDone}/12)`}
          </button>
        </div>
        {CO_LIST.sort((a,b) => b.financials.revenue - a.financials.revenue).map(c => (
          <div
            key={c.id}
            className={`company-pill ${selected === c.id ? "active" : ""}`}
            onClick={() => { setSelected(c.id); if (!segData[c.id]) fetchSegments(c.id); }}
          >
            <div className="co-dot" style={{ background: c.color }} />
            <div style={{ flex: 1 }}>
              <div className="cp-name">{c.displayName}</div>
              <div className="cp-sub">{c.flag} {c.country} · ${c.financials.revenue}B rev</div>
            </div>
            {loading[c.id] ? <span style={{ fontSize: 9, color: 'var(--accent)' }}>…</span>
              : segData[c.id] && !segData[c.id].error ? <span style={{ fontSize: 10, color: '#10B981' }}>✓</span>
              : null}
          </div>
        ))}
      </div>

      <div>
        <div className="detail-panel">
          <div className="detail-header">
            <div>
              <div className="detail-title" style={{ color: co.color }}>{co.displayName}</div>
              <div className="detail-meta">
                <span className="meta-chip">Segment Breakdown</span>
                <span className="meta-chip">FY2024</span>
              </div>
            </div>
          </div>

          {seg && !seg.error ? (
            <div>
              {/* Business split */}
              {seg.businessSplit && (
                <div>
                  <div className="section-title">EBITDA by Business Segment</div>
                  <div style={{ marginBottom: 20 }}>
                    {seg.businessSplit.map((s, i) => (
                      <div key={i} style={{ marginBottom: 10 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                          <span style={{ color: "var(--text2)" }}>{s.segment}</span>
                          <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 600 }}>{s.ebitdaPct}%</span>
                        </div>
                        <div className="seg-bar">
                          <div className="seg-bar-fill" style={{ width: `${s.ebitdaPct}%`, background: s.color || co.color }} />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Geo split */}
              {seg.geoSplit && (
                <div>
                  <div className="section-title">Revenue by Geography</div>
                  <div style={{ marginBottom: 20 }}>
                    {seg.geoSplit.map((g, i) => (
                      <div key={i} style={{ marginBottom: 10 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                          <span style={{ color: "var(--text2)" }}>{g.region}</span>
                          <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 600 }}>{g.revenuePct}%</span>
                        </div>
                        <div className="seg-bar">
                          <div className="seg-bar-fill" style={{ width: `${g.revenuePct}%`, background: co.color, opacity: 0.6 + i * 0.1 }} />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Segments table */}
              {seg.segments && seg.segments.length > 0 && (
                <div>
                  <div className="section-title">Segment Financials (USD B)</div>
                  <div className="table-wrap" style={{ marginBottom: 16 }}>
                    <table>
                      <thead>
                        <tr>
                          <th style={{ textAlign: "left" }}>Segment</th>
                          <th>Revenue</th>
                          <th>EBITDA</th>
                          <th>Capex</th>
                          <th>Assets</th>
                        </tr>
                      </thead>
                      <tbody>
                        {seg.segments.map((s, i) => (
                          <tr key={i}>
                            <td style={{ textAlign: "left" }}>{s.name}</td>
                            <td>{s.revenue != null ? `$${s.revenue}B` : "—"}</td>
                            <td>{s.ebitda != null ? `$${s.ebitda}B` : "—"}</td>
                            <td>{s.capex != null ? `$${s.capex}B` : "—"}</td>
                            <td>{s.assets != null ? `$${s.assets}B` : "—"}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* Key facts */}
              {seg.keyFacts && (
                <div>
                  <div className="section-title">Key Segment Facts</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {seg.keyFacts.map((f, i) => (
                      <div key={i} style={{ display: "flex", gap: 10, fontSize: 12, color: "var(--text2)", lineHeight: 1.5 }}>
                        <span style={{ color: co.color, flexShrink: 0 }}>◆</span>
                        <span>{f}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          ) : loading[selected] ? (
            <div className="ai-loading" style={{ padding: 20 }}>
              <div className="dot-pulse"><span /><span /><span /></div>
              <span>Loading segment data for {co.displayName}…</span>
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={{ fontSize: 12, color: "var(--text3)", lineHeight: 1.7 }}>
                Load segment data for <strong style={{ color: "var(--text)" }}>{co.displayName}</strong> — geographic breakdown, business segment EBITDA split, capex allocation, and asset base by division.
                {REAL_SEGMENT_DATA[selected] && (
                  <span style={{ marginLeft: 8, background: "#00C89622", color: "#00C896", fontSize: 10, padding: "2px 7px", borderRadius: 4, fontWeight: 700, letterSpacing: 0.5 }}>
                    📄 FROM ANNUAL REPORT
                  </span>
                )}
              </div>
              <div>
                <button className="ai-btn" onClick={() => fetchSegments(selected)}>
                  {REAL_SEGMENT_DATA[selected] ? "📄 Load Report-Sourced Segments" : "◈ Load AI Segment Breakdown"} for {co.displayName}
                </button>
              </div>
              {seg?.error && (
                <div style={{ fontSize: 11, color: "var(--red)" }}>⚠ {seg.error}</div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

    { key: 'ebitdaMargin', label: 'EBITDA Margin', unit: '%', higher: true, fmt: v => v != null ? v.toFixed(1)+'%' : '—' },
    { key: 'ebitMargin',   label: 'EBIT Margin',   unit: '%', higher: true, fmt: v => v != null ? v.toFixed(1)+'%' : '—' },
    { key: 'niMargin',     label: 'Net Income Margin', unit: '%', higher: true, fmt: v => v != null ? v.toFixed(1)+'%' : '—' },
    { key: 'ndEbitda',     label: 'ND / EBITDA',   unit: 'x', higher: false, fmt: v => v != null ? v.toFixed(2)+'x' : '—', src: 'kpis' },
    { key: 'capexRev',     label: 'Capex / Revenue', unit: '%', higher: false, fmt: v => v != null ? v.toFixed(1)+'%' : '—' },
    { key: 'fcfEbitda',    label: 'FCF / EBITDA',  unit: 'x', higher: true, fmt: v => v != null ? v.toFixed(2)+'x' : '—' },
    { key: 'evEbitda',     label: 'EV / EBITDA',   unit: 'x', higher: false, fmt: v => v != null ? v.toFixed(1)+'x' : '—', src: 'fin' },
    { key: 'capexEbitda',  label: 'Capex / EBITDA', unit: 'x', higher: false, fmt: v => v != null ? v.toFixed(2)+'x' : '—' },
  ];

  const getRankClass = (rank, total, higherBetter) => {
    if (higherBetter) {
      if (rank === 1) return 'kpi-rank-1';
      if (rank === 2) return 'kpi-rank-2';
      if (rank === 3) return 'kpi-rank-3';
      if (rank === total) return 'kpi-rank-last';
      if (rank === total - 1) return 'kpi-rank-slast';
    } else {
      if (rank === 1) return 'kpi-rank-1'; // best = lowest
      if (rank === 2) return 'kpi-rank-2';
      if (rank === 3) return 'kpi-rank-3';
      if (rank === total) return 'kpi-rank-last';
      if (rank === total - 1) return 'kpi-rank-slast';
    }
    return '';
  };

  const getKpiRanks = (rowKey, higherBetter, src) => {
    const vals = CO_LIST.map(co => {
      let v;
      if (src === 'fin') v = co.financials[rowKey];
      else if (src === 'kpis') v = co.kpis[rowKey];
      else v = co.kpis[rowKey] ?? co.financials[rowKey];
      return { id: co.id, v };
    }).filter(x => x.v != null);
    vals.sort((a, b) => higherBetter ? b.v - a.v : a.v - b.v);
    const ranks = {};
    vals.forEach((x, i) => { ranks[x.id] = i + 1; });
    return { ranks, total: vals.length };
  };

  // Generate AI synthesis for KPI section
  const genKpiSynthesis = async () => {
    setKpiSynthLoading(true);
    const snapshot = CO_LIST.map(co => `${co.displayName}: EBITDA%=${co.kpis.ebitdaMargin}%, NI%=${co.kpis.niMargin}%, ND/EBITDA=${co.kpis.ndEbitda}x, EV/EBITDA=${co.financials.evEbitda}x, Capex/Rev=${co.kpis.capexRev}%`).join('\n');
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content: `You are a senior utility sector analyst. Here are FY2024 operational KPIs for 12 global energy companies:\n\n${snapshot}\n\nWrite a 220-250 word cross-company synthesis. Use **bold** for company names and key insights. Cover:\n1. Which companies lead on profitability margins and why (business model drivers)\n2. Leverage comparison — who is most/least stretched and what it means for strategy\n3. Capex intensity leaders vs cash generators — what this signals about growth phase\n4. Valuation outliers (cheapest and most expensive EV/EBITDA) and whether they're justified\n\nBe specific and analytical. Name companies. Avoid generic statements.` }]
        })
      });
      const d = await r.json();
      setKpiSynthesis(d.content?.[0]?.text || "Analysis unavailable.");
    } catch { setKpiSynthesis("Failed to generate synthesis."); }
    setKpiSynthLoading(false);
  };

  const genSegSynthesis = async () => {
    setSegSynthLoading(true);
    const snapshot = `
Renewables % EBITDA: EDPR 100%, Orsted 97%, Copel 60%, NextEra 55%, RWE 53%, ENEL 40%, EDP 45%, Iberdrola 35%, Kansai 12%, Duke 8%, Eletrobras 10%, NTPC 5%
Regulated/Networks % EBITDA: Duke 86%, NTPC 80%, Kansai 78%, Copel 60%, Eletrobras 57%, EDP 43%, ENEL 44%, Iberdrola 37%, NextEra 34%, EDP_Ren 0%, RWE 0%, Orsted 3%
Thermal/Gas % EBITDA: NTPC 84%, Kansai 70%, RWE 34%, Eletrobras 30%, ENEL 18%, EDP 12%, Duke 8%, Copel 5%, Iberdrola 5%, NextEra 0%, EDPR 0%, Orsted 3%
International Revenue: EDPR 100%, Orsted 90%, RWE 74%, ENEL 67%, EDP 60%, Iberdrola 62%, Copel 5%, Eletrobras 5%, NTPC 5%, Duke 2%, NextEra 2%, Kansai 5%`;
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content: `You are a senior energy sector analyst. Here is cross-company segment composition data for 12 global utilities:\n\n${snapshot}\n\nWrite a 220-250 word comparative analysis. Use **bold** for company names and key insights. Address:\n1. The spectrum from pure-play renewables (EDPR, Orsted) to coal-heavy (NTPC, Kansai) and what transition risk this implies\n2. Regulated vs merchant exposure — who has the most/least earnings visibility\n3. Geographic diversification as a risk mitigant or concentration risk\n4. Which business mix positions companies best and worst for the energy transition over 5-10 years\n\nBe specific and analytical. Name specific companies. Avoid generic statements.` }]
        })
      });
      const d = await r.json();
      setSegSynthesis(d.content?.[0]?.text || "Analysis unavailable.");
    } catch { setSegSynthesis("Failed to generate synthesis."); }
    setSegSynthLoading(false);
  };

  const genStratSynthesis = async () => {
    setStratSynthLoading(true);
    const winners = CO_LIST.filter(c => STRATEGY_DATA[c.id]?.verdict === 'winner').map(c => c.displayName).join(', ');
    const losers = CO_LIST.filter(c => STRATEGY_DATA[c.id]?.verdict === 'loser').map(c => c.displayName).join(', ');
    const snapshot = CO_LIST.map(co => {
      const sd = STRATEGY_DATA[co.id];
      return `${co.displayName}: Model=${sd?.model?.substring(0,80)}... Strengths=${sd?.strengths?.join('; ')} Risks=${sd?.risks?.join('; ')}`;
    }).join('\n');
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content: `You are a senior energy sector strategist. Here is a business model and strategy summary for 12 global utilities:\n\n${snapshot}\n\nIdentified winners: ${winners}\nIdentified losers: ${losers}\n\nWrite a 240-270 word strategic synthesis. Use **bold** for company names and key themes. Cover:\n1. What separates the clear winners from the rest — common traits among top performers\n2. The key strategic fault lines in the sector (regulated vs merchant, fossil vs renewable, domestic vs international)\n3. Which companies are best positioned for the energy transition and why\n4. Key macro risks that could change the winners/losers ranking (interest rates, IRA policy, power demand growth, nuclear restart)\n\nBe decisive and analytical. Name companies. Take a point of view.` }]
        })
      });
      const d = await r.json();
      setStratSynthesis(d.content?.[0]?.text || "Analysis unavailable.");
    } catch { setStratSynthesis("Failed to generate synthesis."); }
    setStratSynthLoading(false);
  };

  const coListSorted = [...CO_LIST].sort((a, b) => b.financials.revenue - a.financials.revenue);

  const exportPayload = getExportPayload ? getExportPayload() : '{}';

  return (
    <div>
      <style>{COMP_STYLES}</style>

      {/* Export Modal */}
      {showExportModal && (() => {
        const fullPayload = getExportPayload ? getExportPayload() : '{}';
        const allData = (() => { try { return JSON.parse(fullPayload); } catch { return {}; } })();
        const counts = {
          companies: Object.keys(allData.analyses || {}).length,
          detailReports: Object.keys(allData.aiData || {}).length,
          kpiSynth: allData.kpiSynthesis ? 1 : 0,
          segSynth: allData.segSynthesis ? 1 : 0,
          stratSynth: allData.stratSynthesis ? 1 : 0,
        };
        const copyAll = () => {
          try {
            const ta = document.createElement('textarea');
            ta.value = fullPayload;
            ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.focus(); ta.select();
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            if (ok) { alert(`✓ Copied all data to clipboard!

Contains:
• ${counts.companies}/12 company analyses
• KPI synthesis: ${counts.kpiSynth ? 'yes' : 'no'}
• Segment synthesis: ${counts.segSynth ? 'yes' : 'no'}
• Strategy synthesis: ${counts.stratSynth ? 'yes' : 'no'}

Paste into a file named energy_analyses.json`); setShowExportModal(false); }
            else throw new Error('execCommand failed');
          } catch {
            navigator.clipboard.writeText(fullPayload)
              .then(() => { alert('✓ Copied to clipboard! Paste into energy_analyses.json'); setShowExportModal(false); })
              .catch(() => alert('Auto-copy failed. Click inside the text area, press Ctrl+A then Ctrl+C.'));
          }
        };
        return (
          <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.88)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}
            onClick={e => { if (e.target === e.currentTarget) setShowExportModal(false); }}>
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border2)', borderRadius: 16, padding: 24, maxWidth: 700, width: '100%', maxHeight: '85vh', display: 'flex', flexDirection: 'column', gap: 14 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <span style={{ fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 16, color: 'var(--text)' }}>Export All AI Analyses</span>
                  <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 4, fontFamily: "'DM Mono', monospace" }}>
                    {counts.companies}/12 company analyses · {counts.kpiSynth + counts.segSynth + counts.stratSynth}/3 syntheses · {counts.detailReports}/12 detail
                  </div>
                </div>
                <button onClick={() => setShowExportModal(false)} style={{ background: 'none', border: 'none', color: 'var(--text3)', cursor: 'pointer', fontSize: 22, lineHeight: 1 }}>✕</button>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 8 }}>
                {[
                  { label: 'AI Analysis Tab', val: `${counts.companies}/12`, ok: counts.companies === 12 },
                  { label: 'Company Detail Tab', val: `${counts.detailReports}/12`, ok: counts.detailReports === 12 },
                  { label: 'KPI + Seg Synth', val: (counts.kpiSynth && counts.segSynth) ? '✓' : `${counts.kpiSynth + counts.segSynth}/2`, ok: counts.kpiSynth && counts.segSynth },
                  { label: 'Strategy Synthesis', val: counts.stratSynth ? '✓' : '—', ok: counts.stratSynth },
                ].map(({ label, val, ok }) => (
                  <div key={label} style={{ background: 'var(--surface2)', borderRadius: 8, padding: '8px 12px', border: `1px solid ${ok ? 'rgba(16,185,129,0.3)' : 'var(--border)'}` }}>
                    <div style={{ fontSize: 16, fontWeight: 700, color: ok ? '#10B981' : 'var(--text3)', fontFamily: "'Syne',sans-serif" }}>{val}</div>
                    <div style={{ fontSize: 10, color: 'var(--text3)', marginTop: 2 }}>{label}</div>
                  </div>
                ))}
              </div>
              <p style={{ fontSize: 11, color: 'var(--text3)', margin: 0, lineHeight: 1.6 }}>
                Click <strong style={{color:'var(--text)'}}>⎘ Copy All</strong> then open any text editor, paste, and save as <strong style={{color:'var(--accent)'}}>energy_analyses.json</strong>. Use <strong style={{color:'var(--text)'}}>↑ Import</strong> next time to restore instantly.
              </p>
              <textarea
                readOnly
                value={fullPayload}
                ref={el => { if (el) { el.focus(); el.select(); } }}
                style={{ flex: 1, minHeight: 260, background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 8, padding: 12, fontFamily: "'DM Mono', monospace", fontSize: 9.5, color: 'var(--text2)', resize: 'none', lineHeight: 1.5 }}
              />
              <div style={{ display: 'flex', gap: 10 }}>
                <button onClick={copyAll}
                  style={{ flex: 1, padding: '11px 0', borderRadius: 8, border: 'none', background: 'var(--accent)', color: 'white', cursor: 'pointer', fontFamily: "'DM Mono', monospace", fontSize: 12, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase' }}>
                  ⎘ Copy All to Clipboard
                </button>
                <button onClick={() => setShowExportModal(false)}
                  style={{ padding: '11px 20px', borderRadius: 8, border: '1px solid var(--border2)', background: 'transparent', color: 'var(--text3)', cursor: 'pointer', fontFamily: "'DM Mono', monospace", fontSize: 11 }}>
                  Close
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Header */}
      <div className="ai-analysis-header">
        <div className="ai-analysis-header-left">
          <h2>◈ AI Business Analysis</h2>
          <p>FY2024 · 12 Companies · Auto-generating · claude-sonnet-4</p>
        </div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <button onClick={() => setShowExportModal(true)} style={{ padding: '10px 18px', borderRadius: 8, border: '1px solid var(--border2)', background: 'transparent', color: 'var(--text2)', cursor: 'pointer', fontFamily: "'DM Mono', monospace", fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase' }}>
              ↓ Export {totalDone > 0 ? `(${totalDone})` : ''}
            </button>
          <button onClick={() => setShowPdfPreview(true)}
            style={{ padding: '10px 18px', borderRadius: 8, border: '1px solid rgba(91,139,255,0.4)', background: 'rgba(91,139,255,0.08)', color: 'var(--accent)', cursor: 'pointer', fontFamily: "'DM Mono', monospace", fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase', fontWeight: 600 }}>
            ⬇ Print / PDF
          </button>
          <label style={{ padding: '10px 18px', borderRadius: 8, border: '1px solid var(--border2)', background: 'transparent', color: 'var(--text3)', cursor: 'pointer', fontFamily: "'DM Mono', monospace", fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase' }}>
            ↑ Import
            <input type="file" accept=".json" style={{ display: 'none' }} onChange={(e) => {
              const file = e.target.files[0]; if (!file) return;
              const reader = new FileReader();
              reader.onload = (ev) => {
                try {
                  const d = JSON.parse(ev.target.result);
                  if (handleImportUp) handleImportUp(d);
                } catch { alert('Invalid JSON file'); }
              };
              reader.readAsText(file);
              e.target.value = '';
            }} />
          </label>
          {totalDone > 0 && (
            <button onClick={resetAll} style={{ padding: '10px 18px', borderRadius: 8, border: '1px solid var(--border2)', background: 'transparent', color: 'var(--text3)', cursor: 'pointer', fontFamily: "'DM Mono', monospace", fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase' }}>
              ↺ Reset
            </button>
          )}
          {Object.values(selected).some(Boolean) && !isGeneratingAll && (
            <button className="generate-all-btn" onClick={generateSelected}>
              <span className="btn-icon">◈</span>
              Generate ({Object.values(selected).filter(Boolean).length})
            </button>
          )}
          {!Object.values(selected).some(Boolean) && !isGeneratingAll && totalDone < 12 && (
            <button className="generate-all-btn" onClick={selectAll}>
              <span className="btn-icon">☐</span>
              Select All
            </button>
          )}
          {isGeneratingAll && (
            <button className="generate-all-btn" disabled>
              <span className="btn-icon">◈</span>
              Generating ({totalLoading} running…)
            </button>
          )}
          {totalDone === 12 && !isGeneratingAll && (
            <button className="generate-all-btn" disabled>
              <span className="btn-icon">✓</span>
              All Generated
            </button>
          )}
        </div>
      </div>

      {/* Progress */}
      {(totalDone > 0 || isGeneratingAll) && (
        <div className="ai-progress-bar">
          <span className="ai-progress-label">Progress</span>
          <div className="ai-progress-track"><div className="ai-progress-fill" style={{ width: `${(totalDone / 12) * 100}%` }} /></div>
          <span className="ai-progress-count">{totalDone} / 12</span>
        </div>
      )}

      {/* Cards grid */}
      <div className="ai-cards-grid">
        {coListSorted.map(co => {
          const isLoading = loading[co.id];
          const analysis = analyses[co.id];
          const error = errors[co.id];
          return (
            <div key={co.id} className={`ai-card ${analysis ? 'has-analysis' : ''}`} style={{ borderTopColor: analysis ? co.color : undefined, borderTopWidth: analysis ? 2 : 1 }}>
              <div className="ai-card-header">
                <div className="ai-card-co">
                  <div className="ai-card-dot" style={{ background: co.color }} />
                  <div>
                    <div className="ai-card-name">{co.displayName}</div>
                    <div className="ai-card-meta">{co.flag} {co.exchange} · {co.ticker}</div>
                  </div>
                </div>
                <div className="ai-card-kpis">
                  <div className="ai-card-kpi"><div className="ai-card-kpi-val">${co.financials.revenue}B</div><div className="ai-card-kpi-lbl">Revenue</div></div>
                  <div className="ai-card-kpi"><div className="ai-card-kpi-val" style={{ color: co.color }}>{co.kpis.ebitdaMargin}%</div><div className="ai-card-kpi-lbl">EBITDA%</div></div>
                  <div className="ai-card-kpi"><div className="ai-card-kpi-val">{co.kpis.ndEbitda}x</div><div className="ai-card-kpi-lbl">ND/EBITDA</div></div>
                </div>
              </div>
              <div className="ai-card-body">
                {isLoading ? (
                  <div className="ai-card-loading">
                    <div className="ai-loading-bar"><div className="ai-loading-bar-fill" style={{ background: co.color }} /></div>
                    <div className="ai-loading-text">Analyzing {co.displayName}…</div>
                    <button className="ai-card-solo-btn" style={{ marginTop: 8, color: 'var(--red)', borderColor: 'var(--red)' }} onClick={() => forceStop(co.id)}>✕ Cancel</button>
                  </div>
                ) : error ? (
                  <div className="ai-card-error">
                    <div>⚠ {error}</div>
                    <button className="ai-card-solo-btn" onClick={() => { setErrors(prev => ({...prev, [co.id]: null})); fetchOne(co.id); }}>↺ Retry</button>
                  </div>
                ) : analysis ? (
                  <div className="ai-analysis-text">{renderAnalysis(analysis)}</div>
                ) : (
                  <div className="ai-card-idle" onClick={() => toggleSelect(co.id)}
                    style={{ cursor: 'pointer', border: selected[co.id] ? `2px solid ${co.color}` : '2px solid transparent', borderRadius: 10, padding: 12, transition: 'border 0.15s' }}>
                    <div style={{ fontSize: 22, opacity: selected[co.id] ? 1 : 0.35 }}>{selected[co.id] ? '☑' : '☐'}</div>
                    <div className="ai-card-idle-text">{selected[co.id] ? 'Selected' : 'Click to select'}</div>
                    <button className="ai-card-solo-btn" onClick={(e) => { e.stopPropagation(); fetchOne(co.id); }}>◈ Run now</button>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* ═══════════════════════════════════════════════════════════════════════
          COMPARISON 1 — OPERATIONAL KPIs
      ═══════════════════════════════════════════════════════════════════════ */}
      <div className="comp-section">
        <div className="comp-section-header">
          <div>
            <div className="comp-section-title">① Operational <span>KPI</span> Comparison</div>
            <div className="comp-section-sub">Cross-company metrics · FY2024 · 🥇gold = best · 🔴red = worst</div>
          </div>
          <button className="comp-gen-btn" onClick={genKpiSynthesis} disabled={kpiSynthLoading}>
            {kpiSynthLoading ? '◈ Generating…' : kpiSynthesis ? '↺ Regenerate AI Synthesis' : '◈ Generate AI Synthesis'}
          </button>
        </div>

        <div className="kpi-comp-table">
          <table>
            <thead>
              <tr>
                <th style={{ textAlign: 'left', minWidth: 140 }}>Metric</th>
                {coListSorted.map(co => (
                  <th key={co.id} style={{ minWidth: 90 }}>
                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
                      <span style={{ color: co.color }}>{co.flag}</span>
                      <span>{co.displayName.split(' ')[0]}</span>
                    </div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {kpiRows.map(row => {
                const { ranks, total } = getKpiRanks(row.key, row.higher, row.src);
                return (
                  <tr key={row.key}>
                    <td style={{ textAlign: 'left', color: 'var(--text2)', fontWeight: 500 }}>{row.label}</td>
                    {coListSorted.map(co => {
                      let v;
                      if (row.src === 'fin') v = co.financials[row.key];
                      else if (row.src === 'kpis') v = co.kpis[row.key];
                      else v = co.kpis[row.key] ?? co.financials[row.key];
                      const rank = ranks[co.id];
                      const cls = rank ? getRankClass(rank, total, row.higher) : '';
                      return (
                        <td key={co.id} className={cls}>
                          {row.fmt(v)}
                          {rank === 1 && ' ★'}
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* AI Synthesis */}
        {(kpiSynthLoading || kpiSynthesis) && (
          <div className="ai-synthesis">
            <div className="ai-synthesis-header">
              <span className="ai-synthesis-icon">◈</span>
              <span className="ai-synthesis-title">AI KPI Synthesis — Cross-Company Analysis</span>
            </div>
            {kpiSynthLoading ? (
              <div className="ai-synthesis-loading">
                <div className="ai-loading-bar" style={{ width: 200 }}><div className="ai-loading-bar-fill" style={{ background: 'var(--accent)' }} /></div>
                <span className="ai-synthesis-loading-text">Generating cross-company KPI synthesis…</span>
              </div>
            ) : (
              <div>{renderSynthesis(kpiSynthesis)}</div>
            )}
          </div>
        )}
      </div>

      {/* ═══════════════════════════════════════════════════════════════════════
          COMPARISON 2 — SEGMENT COMPARISON
      ═══════════════════════════════════════════════════════════════════════ */}
      <div className="comp-section">
        <div className="comp-section-header">
          <div>
            <div className="comp-section-title">② Segment <span>Composition</span> Comparison</div>
            <div className="comp-section-sub">Business mix · % of EBITDA · Geography diversification</div>
          </div>
          <button className="comp-gen-btn" onClick={genSegSynthesis} disabled={segSynthLoading}>
            {segSynthLoading ? '◈ Generating…' : segSynthesis ? '↺ Regenerate AI Synthesis' : '◈ Generate AI Synthesis'}
          </button>
        </div>

        <div className="seg-comp-grid">
          {Object.entries(SEG_COMPARISON).map(([key, seg]) => {
            const sorted = Object.entries(seg.values).sort((a, b) => b[1] - a[1]);
            const max = sorted[0][1];
            return (
              <div key={key} className="seg-comp-card">
                <div className="seg-comp-card-title">{seg.label}</div>
                {sorted.map(([coId, pct]) => {
                  const co = CO_LIST.find(c => c.id === coId);
                  if (!co) return null;
                  return (

// ─── PDF OVERLAY ──────────────────────────────────────────────────────────────
function PdfOverlay({ onClose, analyses = {}, aiData = {}, kpiSynth, segSynth, stratSynth }) {
  const allText = { ...analyses };
  Object.keys(aiData).forEach(k => { if (!allText[k]) allText[k] = aiData[k]; });
  const sorted = [...CO_LIST].sort((a, b) => b.financials.revenue - a.financials.revenue);
  const today = new Date().toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });

  const fmt = v => v != null ? v : '—';

  const renderMd = txt => {
    if (!txt) return null;
    return txt.split(/\n\n+/).map((para, pi) => {
      const lines = para.split(/\n/);
      return (
        <div key={pi} style={{marginBottom:8}}>
          {lines.map((line, li) => {
            if (line.startsWith('### ')) return <div key={li} style={{fontWeight:700,fontSize:11,color:'#5b8bff',margin:'6px 0 2px'}}>{line.slice(4)}</div>;
            if (line.startsWith('## ') || line.startsWith('# ')) return <div key={li} style={{fontWeight:700,fontSize:12,color:'#0d1a35',margin:'8px 0 3px',borderBottom:'1px solid #eee',paddingBottom:2}}>{line.replace(/^#+\s/,'')}</div>;
            if (line.startsWith('- ') || line.startsWith('* ')) return <div key={li} style={{paddingLeft:12,marginBottom:2}}>• {line.slice(2).replace(/\*\*(.+?)\*\*/g,'$1')}</div>;
            const parts = line.split(/\*\*(.+?)\*\*/g);
            return <div key={li} style={{marginBottom:2}}>{parts.map((p,i) => i%2===1 ? <strong key={i}>{p}</strong> : p)}</div>;
          })}
        </div>
      );
    });
  };

  const page = (content, bg='#fff') => (
    <div style={{width:794,minHeight:1123,background:bg,margin:'0 auto 20px',boxShadow:'0 2px 16px rgba(0,0,0,0.25)',position:'relative',flexShrink:0,pageBreakAfter:'always'}}>
      {content}
    </div>

  // Cover page
  const cover = page(
    <div style={{background:'#0d1a35',minHeight:1123,padding:'80px 72px',color:'#fff',boxSizing:'border-box'}}>

      <div style={{fontSize:52,fontWeight:800,color:'#fff',lineHeight:1.05}}>Global Energy</div>
      <div style={{fontSize:52,fontWeight:800,color:'#5b8bff',lineHeight:1.05,marginBottom:12}}>Benchmarking</div>
      <div style={{fontSize:16,color:'#8aa0cc',marginBottom:4}}>AI Analysis Edition</div>
      <div style={{fontSize:10,color:'#3a5070',marginBottom:28}}>12 Global Utilities · FY2024 · USD Billions · Powered by Claude Sonnet</div>
      <div style={{width:80,height:2,background:'#5b8bff',marginBottom:24}}/>
      <div style={{fontSize:8,letterSpacing:'0.1em',textTransform:'uppercase',color:'#d4af37',marginBottom:8}}>Contents</div>
      {['01  KPI Summary — All 12 Companies', kpiSynth&&'02  Cross-Company KPI Synthesis', segSynth&&'03  Segment Composition Analysis', stratSynth&&'04  Strategic Positioning Matrix', `05  Company Analysis Reports (${sorted.filter(c=>allText[c.id]).length})`].filter(Boolean).map((t,i)=>(
        <div key={i} style={{fontSize:10,color:'#8aa0cc',padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>{t}</div>
      ))}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginTop:24}}>
        {sorted.map(co => (
          <div key={co.id} style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:4,padding:'5px 8px',display:'flex',alignItems:'center',gap:6}}>

        {synthPage('③', 'Strategic Positioning Matrix', stratSynth, '#d4af37')}
        {coPages}
        <div style={{textAlign:'center',padding:'20px',color:'rgba(255,255,255,0.3)',fontSize:11}}>End of Report · {sorted.filter(c=>allText[c.id]||STRATEGY_DATA[c.id]).length} companies · FY2024</div>
      </div>
    </div>
  );
}


// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("overview");
  const [selected, setSelected] = useState(null);
  const [filesUploaded, setFilesUploaded] = useState(false);
  // Shared AI state — lifted so export/import works across all tabs
  const [sharedAiData, setSharedAiData] = useState(PRELOADED.aiData);
  const [sharedAnalyses, setSharedAnalyses] = useState(PRELOADED.analyses);
  const [sharedSegData, setSharedSegData] = useState(PRELOADED.segData);
  const [showPdfPreview, setShowPdfPreview] = useState(false);



  const [sharedKpiSynth, setSharedKpiSynth] = useState(PRELOADED.kpiSynthesis);
  const [sharedSegSynth, setSharedSegSynth] = useState(PRELOADED.segSynthesis);
  const [sharedStratSynth, setSharedStratSynth] = useState(PRELOADED.stratSynthesis);

  const handleImport = (json) => {
    try {
      const d = typeof json === 'string' ? JSON.parse(json) : json;
      if (d.aiData) setSharedAiData(d.aiData);
      if (d.analyses) setSharedAnalyses(d.analyses);
      if (d.segData) setSharedSegData(d.segData);
      if (d.kpiSynthesis) setSharedKpiSynth(d.kpiSynthesis);
      if (d.segSynthesis) setSharedSegSynth(d.segSynthesis);
      if (d.stratSynthesis) setSharedStratSynth(d.stratSynthesis);
      return true;
    } catch { return false; }
  };

  const getExportPayload = () => JSON.stringify({
    aiData: sharedAiData,
    analyses: sharedAnalyses,
    segData: sharedSegData,
    kpiSynthesis: sharedKpiSynth,
    segSynthesis: sharedSegSynth,
    stratSynthesis: sharedStratSynth,
  }, null, 2);

  const tabs = [
    { id: "overview", label: "Overview" },
    { id: "compare", label: "Compare" },
    { id: "detail", label: "Company Detail" },
    { id: "segments", label: "Segments" },
    { id: "ai", label: "◈ AI Analysis" },
  ];

  return (
    <>
      <style>{styles}</style>
      <div className="app">
        <div className="header">
          <div className="header-left">
            <h1>Global <span>Energy</span> Benchmarking</h1>
            <p>12 Companies · FY2024 · USD Billions</p>
          </div>
          <div className="header-right">
            <div className="nav-tabs">
              {tabs.map(t => (
                <button
                  key={t.id}
                  className={`nav-tab ${t.id === 'ai' ? 'ai-tab' : ''} ${tab === t.id ? "active" : ""}`}
                  onClick={() => setTab(t.id)}
                >
                  {t.label}
                </button>
              ))}
            </div>
          </div>
        </div>

        <div className="main">
          <div style={{display: tab === "overview" ? "block" : "none"}}><OverviewTab selected={selected} setSelected={setSelected} /></div>
          <div style={{display: tab === "compare" ? "block" : "none"}}><CompareTab /></div>
          <div style={{display: tab === "detail" ? "block" : "none"}}><DetailTab filesAvailable={filesUploaded} aiData={sharedAiData} setAiData={setSharedAiData} /></div>
          <div style={{display: tab === "segments" ? "block" : "none"}}><SegmentsTab filesUploaded={filesUploaded} segData={sharedSegData} setSegData={setSharedSegData} /></div>
          <div style={{display: tab === "ai" ? "block" : "none"}}><AIAnalysisTab analyses={sharedAnalyses} setAnalyses={setSharedAnalyses} kpiSynthesis={sharedKpiSynth} setKpiSynthesis={setSharedKpiSynth} segSynthesis={sharedSegSynth} setSegSynthesis={setSharedSegSynth} stratSynthesis={sharedStratSynth} setStratSynthesis={setSharedStratSynth} getExportPayload={getExportPayload} handleImport={handleImport} setShowPdfPreview={setShowPdfPreview} /></div>
        </div>
      </div>
      {showPdfPreview && <PdfOverlay onClose={() => setShowPdfPreview(false)} analyses={sharedAnalyses} aiData={sharedAiData} kpiSynth={sharedKpiSynth} segSynth={sharedSegSynth} stratSynth={sharedStratSynth} />}
    </>
  );
}

// Mount
const domRoot = document.getElementById('root');
const reactRoot = ReactDOM.createRoot(domRoot);
reactRoot.render(React.createElement(App));

</script>
</body>
</html>
