  mfg:    { Downtime:1400, Defects:374, Energy:200,  Labour:150,  Throughput:500  },
  raw:    { Downtime:60,   Defects:120, Energy:10,   Labour:30,   Throughput:40   },

  logi:   { Downtime:90,   Defects:50,  Energy:40,   Labour:120,  Throughput:80   },
};
// Conservative recoverable % midpoints
const MATRIX_REC_PCT = {
  mfg:    { Downtime:40, Defects:15, Energy:17, Labour:22, Throughput:20 },
  raw:    { Downtime:27, Defects:20, Energy:7,  Labour:15, Throughput:15 },

  energy: { Downtime:40, Defects:7,  Energy:20, Labour:15, Throughput:15 },
  logi:   { Downtime:27, Defects:15, Energy:15, Labour:20, Throughput:15 },
};

function SummaryMatrix() {
  const levers = MATRIX_LEVERS.map(l => l.key);
  const industries = MATRIX_INDUSTRIES;

  // Compute row totals (loss) and recoverable
  const rowLoss = (id) => levers.reduce((s,l) => s + MATRIX_LOSS_NUM[id][l], 0);
  const rowRec  = (id) => levers.reduce((s,l) => s + Math.round(MATRIX_LOSS_NUM[id][l] * MATRIX_REC_PCT[id][l] / 100), 0);
  // Column totals
  const colLoss = (l) => industries.reduce((s,ind) => s + MATRIX_LOSS_NUM[ind.id][l], 0);
  const colRec  = (l) => industries.reduce((s,ind) => s + Math.round(MATRIX_LOSS_NUM[ind.id][l] * MATRIX_REC_PCT[ind.id][l] / 100), 0);
  // Grand totals
  const grandLoss = industries.reduce((s,ind) => s + rowLoss(ind.id), 0);
  const grandRec  = industries.reduce((s,ind) => s + rowRec(ind.id), 0);

  const fmt = (n) => n >= 1000 ? `$${(n/1000).toFixed(1)}T` : `$${n}B`;
  const fmtRec = (n) => n >= 1000 ? `$${(n/1000).toFixed(1)}T` : `$${n}B`;

  const leverColors = { Downtime:"#ef4444", Defects:"#f59e0b", Energy:"#22c55e", Labour:"#8b5cf6", Throughput:"#0ea5e9" };
  const impactColor = (id, l) => {
    const v = MATRIX_CELLS[id][l].v;
    return v==="hi" ? "#22c55e33" : v==="med" ? "#f59e0b22" : "rgba(255,255,255,0.03)";
  };

  return (
    <div style={{ marginTop:28 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
        <div style={{ width:4, height:26, background:"linear-gradient(#0ea5e9,#6366f1)", borderRadius:2 }} />
        <span style={{ fontSize:fs(15), fontWeight:700, color:"#e2e8f0", fontFamily:FONT }}>Summary — Annual Loss & Recoverable Value ($B)</span>
      </div>
      <p style={{ margin:"0 0 14px", fontSize:fs(12), color:"#64748b", lineHeight:1.65, fontFamily:FONT }}>
        All figures in USD billions. Loss = estimated annual global economic loss. Rec = conservative recoverable value with full digitalization. Cell shading indicates impact level: green = high, amber = medium, dim = low.
      </p>
      <div style={{ overflowX:"auto", borderRadius:12, border:"1px solid rgba(255,255,255,0.10)" }}>
        <table style={{ borderCollapse:"collapse", width:"100%", minWidth:520, fontFamily:FONT }}>
          <thead>
            <tr style={{ background:"rgba(255,255,255,0.05)" }}>
              <th style={{ textAlign:"left", padding:"10px 10px", fontSize:fs(10), fontWeight:700, color:"#475569", letterSpacing:0.5, borderBottom:"1px solid rgba(255,255,255,0.10)", minWidth:90, whiteSpace:"nowrap" }}>INDUSTRY</th>
              {levers.map(l => (
                <th key={l} style={{ textAlign:"center", padding:"10px 6px", fontSize:fs(10), fontWeight:700, color:leverColors[l], letterSpacing:0.3, borderBottom:"1px solid rgba(255,255,255,0.10)", whiteSpace:"nowrap", borderLeft:"1px solid rgba(255,255,255,0.06)" }}>{l}</th>
              ))}
              <th style={{ textAlign:"center", padding:"10px 8px", fontSize:fs(10), fontWeight:700, color:"#94a3b8", letterSpacing:0.3, borderBottom:"1px solid rgba(255,255,255,0.10)", whiteSpace:"nowrap", borderLeft:"1px solid rgba(255,255,255,0.14)", background:"rgba(255,255,255,0.04)" }}>ROW TOTAL</th>
            </tr>
          </thead>
          <tbody>
            {industries.map((ind, ri) => (
              <tr key={ind.id} style={{ borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                <td style={{ padding:"9px 10px", verticalAlign:"middle" }}>
                  <div style={{ fontSize:fs(11), fontWeight:700, color:"#e2e8f0", fontFamily:FONT, lineHeight:1.3 }}>{ind.label}</div>
                  <div style={{ fontSize:fs(9), color:"#475569", fontFamily:FONT }}>{ind.sub.split(",")[0]}</div>
                </td>
                {levers.map(l => {
                  const loss = MATRIX_LOSS_NUM[ind.id][l];
                  const rec  = Math.round(loss * MATRIX_REC_PCT[ind.id][l] / 100);
                  return (
                    <td key={l} style={{ textAlign:"center", padding:"8px 6px", background:impactColor(ind.id,l), borderLeft:"1px solid rgba(255,255,255,0.06)", verticalAlign:"middle" }}>

                    </td>
                  );
                })}
                <td style={{ textAlign:"center", padding:"8px 8px", borderLeft:"1px solid rgba(255,255,255,0.14)", background:"rgba(255,255,255,0.04)", verticalAlign:"middle" }}>
                  <div style={{ fontSize:fs(13), fontWeight:800, color:"#e2e8f0", fontFamily:FONT, lineHeight:1.2 }}>{fmt(rowLoss(ind.id))}</div>

              <td style={{ textAlign:"center", padding:"10px 8px", borderLeft:"2px solid rgba(14,165,233,0.5)", background:"rgba(14,165,233,0.12)", verticalAlign:"middle" }}>
                <div style={{ fontSize:fs(15), fontWeight:800, color:"#0ea5e9", fontFamily:FONT, lineHeight:1.2 }}>{fmt(grandLoss)}</div>

              </td>
            </tr>
          </tbody>
        </table>
      </div>
      {/* Grand total callout */}
      <div style={{ marginTop:12, borderRadius:12, padding:"14px 16px", background:"rgba(34,197,94,0.08)", border:"1px solid rgba(34,197,94,0.25)", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
        <div>
          <div style={{ fontSize:fs(11), fontWeight:700, color:"#22c55e", fontFamily:FONT, letterSpacing:0.5 }}>TOTAL RECOVERABLE VALUE</div>
          <div style={{ fontSize:fs(11), color:"#64748b", fontFamily:FONT, marginTop:2 }}>Conservative midpoint — full digitalization across all levers</div>

        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:fs(26), fontWeight:800, color:"#22c55e", fontFamily:FONT, lineHeight:1 }}>{fmtRec(grandRec)}</div>
          <div style={{ fontSize:fs(10), color:"#475569", fontFamily:FONT, marginTop:2 }}>per year, globally</div>
        </div>
      </div>
      <div style={{ marginTop:10, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>

          { label:"vs. SW market ($16.6B)", val:`${Math.round(grandRec/16.6)}×`, color:"#f59e0b" },

          </Card>
        ))}
      </div>
    </div>
  );
}

            <div>
              <div style={{ fontSize:fs(10), fontWeight:700, color:"#22c55e", marginBottom:5, letterSpacing:1 }}>PROS</div>
              {p.pros.map((pr,i) => <div key={i} style={{ fontSize:fs(11), color:"#94a3b8", marginBottom:5, fontFamily:FONT, lineHeight:1.4 }}>+ {pr}</div>)}
            </div>
            <div>
              <div style={{ fontSize:fs(10), fontWeight:700, color:"#ef4444", marginBottom:5, letterSpacing:1 }}>CONS</div>
              {p.cons.map((c,i) => <div key={i} style={{ fontSize:fs(11), color:"#94a3b8", marginBottom:5, fontFamily:FONT, lineHeight:1.4 }}>− {c}</div>)}
            </div>
          </div>
          <div style={{ background:"rgba(255,255,255,0.04)", borderRadius:9, padding:"10px 12px", fontSize:fs(12), color:"#64748b", fontFamily:FONT, lineHeight:1.6 }}>{p.note}</div>
        </Card>
      ))}
    </div>
  );
}

function S8() {
  const [sc, setSc] = useState("aggressive");
  const data = REV_SCENARIOS[sc];

  const barH = 165;

  return (
    <div>
      <Intro text="Revenue projections are built on the fixed + variable pricing model, targeting a deliberate mix of SME, mid-market and enterprise industrial accounts. The enterprise-led scenario is the most aggressive: AI Square deliberately pursues large industrial groups with €500M–€5B revenue and multiple plants, where a single group framework agreement can generate €3–8M ARR with the variable savings share component — a completely different revenue trajectory than SME-only growth. All scenarios treat AI agent operations as a billable managed service component included in the base licence." />
      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        {Object.keys(REV_SCENARIOS).map(s => (

            flex:1, background: sc===s ? REV_COLORS[s] : "rgba(255,255,255,0.05)",
            border:`1px solid ${REV_COLORS[s]}55`, borderRadius:10, padding:"9px 6px",
            fontSize:fs(12), fontWeight:700, color: sc===s ? "#fff" : REV_COLORS[s],
            cursor:"pointer", fontFamily:FONT,

      </div>
      <Card style={{ marginBottom:14 }}>
        <div style={{ fontSize:fs(11), fontWeight:700, color:"#475569", marginBottom:12, letterSpacing:1 }}>ARR EVOLUTION (€M) — {REV_LABELS[sc].toUpperCase()}</div>
        <div style={{ display:"flex", alignItems:"flex-end", gap:4, height:barH+32 }}>
          {REV_YEARS.map((yr,i) => {
            const val = data[i];
            const h = Math.max(5, (val/maxVal)*barH);
            return (
              <div key={yr} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center" }}>
                <div style={{ fontSize:9, color, marginBottom:2, height:16, display:"flex", alignItems:"flex-end", fontFamily:FONT, fontWeight:700, textAlign:"center" }}>
                  {val>=100?`€${Math.round(val)}`:val>=10?`€${val}`:`€${val}`}
                </div>
                <div style={{ width:"100%", height:h, borderRadius:"4px 4px 0 0", background:`linear-gradient(to top, ${color}, ${color}77)` }} />
                <div style={{ fontSize:9, color:"#475569", marginTop:4, fontFamily:FONT }}>{yr===2025?"'25":`'${String(yr).slice(2)}`}</div>
              </div>
            );
          })}
        </div>
      </Card>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
        <Card style={{ textAlign:"center", border:`1px solid ${color}55` }}>
          <div style={{ fontSize:fs(28), fontWeight:800, color, fontFamily:FONT, lineHeight:1 }}>€{data[10]}M</div>
          <div style={{ fontSize:fs(11), color:"#94a3b8", marginTop:5, fontFamily:FONT }}>ARR by 2035</div>
        </Card>
        <Card style={{ textAlign:"center", border:`1px solid ${color}55` }}>
          <div style={{ fontSize:fs(26), fontWeight:800, color, fontFamily:FONT, lineHeight:1 }}>{sc==="enterprise"?"~25":sc==="aggressive"?"200+":"400+"}</div>
          <div style={{ fontSize:fs(11), color:"#94a3b8", marginTop:5, fontFamily:FONT }}>{sc==="enterprise"?"enterprise groups":"sites active"}</div>
        </Card>
      </div>
      <Card style={{ marginBottom:14 }}>
        <div style={{ fontSize:fs(11), fontWeight:700, color:"#475569", marginBottom:12, letterSpacing:1 }}>MILESTONES — {REV_LABELS[sc].toUpperCase()}</div>
        {[["2025–26","Land & Prove",data[1]],["2027–28","Expand Modules",data[3]],["2030","Scale Platform",data[5]],["2035","Market Leader",data[10]]].map(([yr,title,val],i) => (
          <div key={yr} style={{ display:"flex", gap:12, marginBottom:12, alignItems:"flex-start" }}>
            <div style={{ flexShrink:0, width:52 }}>
              <div style={{ fontSize:fs(11), fontWeight:700, color, fontFamily:FONT }}>{yr}</div>
            </div>
            <div style={{ flex:1, borderLeft:`2px solid ${color}44`, paddingLeft:12 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, flexWrap:"wrap", gap:4 }}>
                <span style={{ fontSize:fs(14), fontWeight:700, color:"#e2e8f0", fontFamily:FONT }}>{title}</span>
                <span style={{ fontSize:fs(15), fontWeight:800, color, fontFamily:FONT }}>€{val}M ARR</span>
              </div>
              <div style={{ fontSize:fs(12), color:"#64748b", lineHeight:1.55, fontFamily:FONT }}>{REV_MILESTONES[sc][i]}</div>
            </div>
          </div>
        ))}
      </Card>
      <Card>
        <div style={{ fontSize:fs(11), fontWeight:700, color:"#475569", marginBottom:10, letterSpacing:1 }}>PRICING ASSUMPTIONS — {REV_LABELS[sc].toUpperCase()}</div>
        {REV_ASSUMPTIONS[sc].map((a,i) => (
          <div key={i} style={{ display:"flex", gap:9, marginBottom:10, alignItems:"flex-start" }}>
            <span style={{ color, fontSize:fs(13), fontWeight:700, flexShrink:0, lineHeight:1.5 }}>→</span>
            <span style={{ fontSize:fs(12), color:"#94a3b8", lineHeight:1.65, fontFamily:FONT }}>{a}</span>
          </div>
        ))}
        <div style={{ marginTop:14, paddingTop:12, borderTop:"1px solid rgba(255,255,255,0.08)" }}>
          <div style={{ fontSize:fs(11), fontWeight:700, color:"#475569", marginBottom:8, letterSpacing:1 }}>GROSS MARGIN TRAJECTORY</div>
          <p style={{ margin:0, fontSize:fs(12), color:"#64748b", lineHeight:1.75, fontFamily:FONT }}>
            AI agents reduce the marginal cost of serving additional sites — agents monitor, alert and act without requiring proportional human headcount growth. As the agent library matures and self-monitoring reduces intervention requirements, gross margin on incremental ARR improves from approximately 60% in 2025–27 to 75–80% by 2030+. The fixed base licence covers all agent ops costs; the variable savings share is near-pure gross margin above the base — making large enterprise accounts disproportionately valuable to the income statement.
          </p>
        </div>
      </Card>
    </div>
  );
}

const SECTION_COMPONENTS = [S1, S2, S3, S4, S5, S6, S7, S8];

      <div style={{ background:"rgba(10,15,26,0.97)", backdropFilter:"blur(12px)", borderBottom:"1px solid rgba(255,255,255,0.08)", padding:"14px 16px 10px", position:"sticky", top:0, zIndex:100 }}>

          <div>
            <div style={{ fontSize:fs(15), fontWeight:800, color:"#f1f5f9", letterSpacing:-0.4 }}>AI Square</div>
            <div style={{ fontSize:fs(10), color:"#334155" }}>Strategic Intelligence Dashboard · 2025</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:5, overflowX:"auto", paddingBottom:3 }}>
          {SECTIONS.map(s => (
            <button key={s.id} onClick={() => setActive(s.id)} style={{ background: active===s.id ? "linear-gradient(135deg,#0ea5e9,#6366f1)" : "rgba(255,255,255,0.05)", border: active===s.id ? "none" : "1px solid rgba(255,255,255,0.08)", borderRadius:20, padding:"5px 13px", fontSize:fs(11), fontWeight: active===s.id?700:500, color: active===s.id?"#fff":"#64748b", cursor:"pointer", whiteSpace:"nowrap", flexShrink:0 }}>{s.id}. {s.short}</button>

      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:768, background:"rgba(10,15,26,0.98)", backdropFilter:"blur(12px)", borderTop:"1px solid rgba(255,255,255,0.08)", display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 12px 14px" }}>
        <button onClick={() => setActive(Math.max(1,active-1))} disabled={active===1} style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.10)", borderRadius:11, padding:"9px 18px", color: active===1?"#334155":"#94a3b8", fontSize:fs(12), fontWeight:600, cursor: active===1?"default":"pointer" }}>← Prev</button>
        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
          {SECTIONS.map(s => (
            <div key={s.id} onClick={() => setActive(s.id)} style={{ width: active===s.id?18:7, height:7, borderRadius:4, background: active===s.id?"#0ea5e9":"rgba(255,255,255,0.15)", cursor:"pointer", transition:"all 0.2s" }} />
          ))}
        </div>
        <button onClick={() => setActive(Math.min(8,active+1))} disabled={active===8} style={{ background: active===8?"rgba(255,255,255,0.03)":"linear-gradient(135deg,#0ea5e9,#6366f1)", border:"none", borderRadius:11, padding:"9px 18px", color: active===8?"#334155":"#fff", fontSize:fs(12), fontWeight:600, cursor: active===8?"default":"pointer" }}>Next →</button>

}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
